<script>
let currentUser=null,currentLang="en",currentMonth=new Date(),allRequests=[],pendingApprovals=[];
const T={en:{dashboard:"Dashboard",calendar:"Calendar",myRequests:"My Requests",newRequest:"New Request",approvals:"Approvals",admin:"Admin",audit:"Audit Log",submit:"Submit",success:"Success!",error:"Error",noData:"No data",days:"days",remaining:"Remaining"},es:{dashboard:"Panel",calendar:"Calendario",myRequests:"Mis Solicitudes",newRequest:"Nueva Solicitud",approvals:"Aprobaciones",admin:"Admin",audit:"Auditoria",submit:"Enviar",success:"Exito!",error:"Error",noData:"Sin datos",days:"dias",remaining:"Restante"}};
const t=k=>T[currentLang]?.[k]||T.en[k]||k;
document.addEventListener("DOMContentLoaded",async()=>{currentLang=localStorage.getItem("appLang")||"en";document.querySelector(".lang-select").value=currentLang;await loadUserInfo();await loadDashboard();setupNavigation();applyTheme();initCharts()});
async function loadUserInfo(){try{currentUser=await run(getCurrentUser);document.getElementById("userName").textContent=currentUser.name||currentUser.email;document.getElementById("userRole").textContent=currentUser.role||"User";document.getElementById("userAvatar").textContent=(currentUser.name||"U").charAt(0).toUpperCase();if(currentUser.role==="Manager"||currentUser.role==="Admin")document.querySelector(".manager-only").style.display="flex";if(currentUser.role==="Admin")document.querySelector(".admin-only").style.display="flex";run(trackUserActivity)}catch(e){}}
function setupNavigation(){document.querySelectorAll(".nav-item").forEach(b=>b.addEventListener("click",()=>{if(b.dataset.view)switchView(b.dataset.view)}));document.querySelectorAll(".filter-tab").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".filter-tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");filterRequests(tab.dataset.filter)})})}
function switchView(v){document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.view===v));document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.id===v+"View"));document.getElementById("pageTitle").textContent=t(v)||"Dashboard";if(v==="my-requests")loadMyRequests();if(v==="approvals")loadApprovals();if(v==="calendar")renderCalendar();if(v==="audit")loadAuditTrail()}
async function loadDashboard(){try{const[stats,balances,requests]=await Promise.all([run(getDashboardStats),run(getLeaveBalances),run(getRecentRequests)]);renderBalanceCards(balances);renderStats(stats);drawCharts(stats);renderTeamCalendar(requests)}catch(e){}}
function renderBalanceCards(balances){const c=document.getElementById("balanceCards");if(!c)return;c.innerHTML=Object.entries(balances).map(([type,data])=>`<div class="balance-card"><div class="balance-icon">${type==='Sick'?'🏥':type==='Casual'?'🏖️':'⭐'}</div><div class="balance-info"><span class="balance-type">${type}</span><span class="balance-value">${data.remaining} ${t("days")} ${t("remaining")}</span></div><div class="balance-bar"><div class="balance-fill" style="width:${(data.remaining/data.total)*100}%"></div></div></div>`).join("")}
function renderStats(stats){const s=document.getElementById("statsRow");if(!s)return;s.innerHTML=Object.entries(stats).map(([k,v])=>`<div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${k}</div></div>`).join("")}
function renderTeamCalendar(requests){const c=document.getElementById("teamCalendar");if(!c)return;c.innerHTML=requests.length?requests.map(r=>`<div class="team-leave-item"><span>${formatDate(r.startDate)} - ${formatDate(r.endDate)}</span><span>${r.employeeName}</span><span>${r.leaveType}</span></div>`).join(""):`<p class="no-data">${t("noData")}</p>`}
async function loadMyRequests(){try{allRequests=await run(getMyRequests);renderMyRequests(allRequests)}catch(e){}}
function renderMyRequests(requests){const c=document.getElementById("myRequests");if(!c)return;c.innerHTML=requests.length?requests.map(r=>`<div class="request-card"><div class="request-header"><span>${r.leaveType}</span><span>${r.status}</span></div><div class="request-dates">${formatDate(r.startDate)} → ${formatDate(r.endDate)} <strong>${r.workingDays} ${t("days")}</strong></div><div>${r.reason}</div></div>`).join(""):`<p class="no-data">${t("noData")}</p>`}
function filterRequests(f){if(f==="all")renderMyRequests(allRequests);else renderMyRequests(allRequests.filter(r=>r.status===f))}
function setupNewRequestForm(){const today=new Date().toISOString().split("T")[0];const sd=document.getElementById("startDate"),ed=document.getElementById("endDate");if(sd)sd.min=today;if(ed)ed.min=today}
function calculateDays(){const start=new Date(document.getElementById("startDate")?.value),end=new Date(document.getElementById("endDate")?.value);if(start&&end&&!isNaN(start)&&!isNaN(end)){let days=0,cur=new Date(start);while(cur<=end){if(cur.getDay()!==0&&cur.getDay()!==6)days++;cur.setDate(cur.getDate()+1)}document.getElementById("totalDays").textContent=Math.ceil((end-start)/(1000*60*60*24))+1;document.getElementById("workingDays").textContent=days}}
async function submitLeaveRequest(e){e.preventDefault();const form={leaveType:document.getElementById("leaveType").value,startDate:document.getElementById("startDate").value,endDate:document.getElementById("endDate").value,workingDays:parseInt(document.getElementById("workingDays").textContent)||0,reason:document.getElementById("reason").value,coveringPerson:document.getElementById("coveringPerson")?.value||"",emergencyContact:document.getElementById("emergencyContact")?.value||""};try{await run(submitLeave,form);showToast(t("success"),"success");switchView("dashboard")}catch(err){showToast(err.message||t("error"),"error")}}
async function loadApprovals(){try{pendingApprovals=await run(getPendingApprovals);const bc=document.getElementById("pendingCount");if(bc)bc.textContent=pendingApprovals.length;renderApprovals(pendingApprovals)}catch(e){}}
function renderApprovals(requests){const c=document.getElementById("approvalQueue");if(!c)return;c.innerHTML=requests.length?requests.map(r=>`<div class="approval-card"><div class="approval-avatar">${(r.employeeName||"U").charAt(0)}</div><div class="approval-info"><strong>${r.employeeName}</strong><span>${r.leaveType} - ${r.workingDays} ${t("days")}</span><span>${formatDate(r.startDate)} → ${formatDate(r.endDate)}</span></div><div class="approval-actions"><button class="btn btn-success" onclick="approveRequest('${r.requestId}')">Approve</button><button class="btn btn-danger" onclick="showRejectModal('${r.requestId}')">Reject</button></div></div>`).join(""):`<p class="no-data">No pending approvals</p>`}
async function approveRequest(id){try{await run(approveLeaveRequest,id);showToast("Approved!","success");loadApprovals()}catch(e){showToast(e.message,"error")}}
function showRejectModal(id){const reason=prompt("Rejection reason:");if(reason){run(rejectLeaveRequest,id,reason).then(()=>{showToast("Rejected","info");loadApprovals()}).catch(e=>showToast(e.message,"error"))}}
function renderCalendar(){const grid=document.getElementById("calendarGrid"),ml=document.getElementById("currentMonth");if(!grid||!ml)return;const month=currentMonth.getMonth(),year=currentMonth.getFullYear();ml.textContent=new Date(year,month).toLocaleDateString(currentLang,{month:"long",year:"numeric"});const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate(),today=new Date();let html="<div class='calendar-weekdays'>";["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>html+=`<div>${d}</div>`);html+="</div><div class='calendar-days'>";for(let i=0;i<firstDay;i++)html+="<div></div>";for(let d=1;d<=daysInMonth;d++){const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();html+=`<div class="${isToday?'today':''}">${d}</div>`}html+="</div>";grid.innerHTML=html}
function prevMonth(){currentMonth.setMonth(currentMonth.getMonth()-1);renderCalendar()}
function nextMonth(){currentMonth.setMonth(currentMonth.getMonth()+1);renderCalendar()}
async function loadAuditTrail(){try{const logs=await run(getAuditLogs);const c=document.getElementById("auditList");if(c)c.innerHTML=logs.length?logs.map(l=>`<div class="audit-item"><span>${formatDateTime(l.timestamp)}</span><span>${l.user}</span><span>${l.action}</span></div>`).join(""):`<p class="no-data">${t("noData")}</p>`}catch(e){}}
function initCharts(){if(typeof google!=="undefined"){google.charts.load("current",{packages:["corechart"]});google.charts.setOnLoadCallback(()=>run(getChartData).then(drawCharts).catch(()=>{}))}}
function drawCharts(data){if(!data)return;if(data.statusCounts){const d=google.visualization.arrayToDataTable([["Status","Count"],["Approved",data.statusCounts.Approved||0],["Pending",data.statusCounts.Pending||0],["Rejected",data.statusCounts.Rejected||0]]);const el=document.getElementById("donutChart");if(el)new google.visualization.PieChart(el).draw(d,{pieHole:0.5,colors:["#10B981","#F59E0B","#EF4444"],legend:"bottom"})}if(data.monthly){const m=google.visualization.arrayToDataTable([["Month","Requests"],...data.monthly.map(x=>[x.month||"",x.count||0])]);const el=document.getElementById("lineChart");if(el)new google.visualization.LineChart(el).draw(m,{colors:["#EC4899"],curveType:"function",legend:"none",pointSize:5})}}
function changeLanguage(l){currentLang=l;localStorage.setItem("appLang",l);location.reload()}
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute("data-theme")==="dark";h.setAttribute("data-theme",d?"light":"dark");document.querySelector(".btn-icon").textContent=d?"🌙":"☀️";localStorage.setItem("theme",d?"light":"dark")}
function applyTheme(){const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);document.querySelector(".btn-icon").textContent=t==="dark"?"☀️":"🌙"}
const run=fn=>new Promise((r,e)=>google.script.run.withSuccessHandler(r).withFailureHandler(e)[fn.name]());
function formatDate(d){return d?new Date(d).toLocaleDateString():""}
function formatDateTime(d){return d?new Date(d).toLocaleString():""}
function showToast(m,type="info"){const c=document.getElementById("toastContainer")||document.body.appendChild(Object.assign(document.createElement("div"),{id:"toastContainer"}));const x=Object.assign(document.createElement("div"),{className:"toast "+type,textContent:m});c.appendChild(x);setTimeout(()=>{x.style.opacity="0";setTimeout(()=>x.remove(),300)},3000)}
async function exportExcel(){try{window.open((await run(exportToExcelFile)).url)}catch(e){showToast(t("error"),"error")}}
async function generatePDF(){try{showToast((await run(generatePDFReport,"LeaveReport",{})).fileName,"success")}catch(e){showToast(t("error"),"error")}}
</script>
