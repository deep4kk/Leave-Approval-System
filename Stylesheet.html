<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#EC4899;--primary-dark:#DB2777;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--bg-primary:#FFFFFF;--bg-secondary:#F9FAFB;--bg-card:#FFFFFF;--text-primary:#1F2937;--text-secondary:#6B7280;--border-color:#E5E7EB;--shadow:0 4px 6px -1px rgba(0,0,0,0.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1);--radius:12px;--radius-lg:16px;--sidebar-width:260px;}
[data-theme="dark"]{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#0f3460;--text-primary:#eaeaea;--text-secondary:#a0a0a0;--border-color:#2a2a4a;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Roboto,sans-serif;background:var(--bg-secondary);color:var(--text-primary);line-height:1.5;overflow:hidden}
.app-container{display:flex;height:100vh}
.sidebar{width:var(--sidebar-width);background:linear-gradient(180deg,#1F2937,#111827);color:white;display:flex;flex-direction:column}
.sidebar-header{padding:24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:white}
.logo-text{font-size:18px;font-weight:600}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:transparent;border:none;color:#9CA3AF;font-size:14px;font-weight:500;border-radius:var(--radius);cursor:pointer;width:100%;transition:all 0.2s}
.nav-item:hover{background:rgba(255,255,255,0.1);color:white}
.nav-item.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.1)}
.user-info{display:flex;align-items:center;gap:12px;padding:8px;border-radius:var(--radius);background:rgba(255,255,255,0.05)}
.user-avatar{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
.user-name{font-weight:600;font-size:14px}.user-role{font-size:12px;color:#9CA3AF}
.theme-toggle{display:flex;gap:8px;margin-top:12px}
.btn-icon{background:rgba(255,255,255,0.1);border:none;color:white;padding:8px 12px;border-radius:8px;cursor:pointer}
.lang-select{background:rgba(255,255,255,0.1);border:none;color:white;padding:8px;border-radius:8px;cursor:pointer}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:var(--bg-card);padding:16px 32px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:24px;font-weight:600}.top-actions{display:flex;gap:12px}
.content-area{flex:1;padding:24px 32px;overflow-y:auto}
.view{display:none;animation:fadeIn 0.3s}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.balance-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.balance-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px}
.balance-icon{font-size:32px}.balance-info{flex:1}.balance-type{font-weight:600;display:block}.balance-value{font-size:14px;color:var(--text-secondary)}
.balance-bar{height:6px;background:var(--gray-200);border-radius:3px;margin-top:8px}
.balance-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:3px;transition:width 0.5s}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);text-align:center;border-left:4px solid var(--primary)}
.stat-value{font-size:28px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.chart-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:24px}
.chart-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.chart-card h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text-primary)}.chart-card>div{height:250px}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.calendar-nav{display:flex;align-items:center;gap:16px}
.calendar-grid{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
.calendar-weekdays div{text-align:center;font-weight:600;color:var(--text-secondary);font-size:12px}
.calendar-days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.calendar-days div{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:14px}
.calendar-days div.today{background:var(--primary);color:white}
.calendar-legend{display:flex;gap:24px;margin-top:16px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-secondary)}
.legend-dot{width:12px;height:12px;border-radius:50%;background:#EF4444}
.request-card,.approval-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.request-header{display:flex;justify-content:space-between;margin-bottom:12px}
.request-dates{display:flex;gap:12px;align-items:center;font-size:14px}.request-dates strong{color:var(--primary)}
.approval-card{display:flex;align-items:center;gap:16px}
.approval-avatar{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:white;font-weight:600}
.approval-info{flex:1}.approval-info strong{display:block;font-size:16px}.approval-info span{display:block;font-size:14px;color:var(--text-secondary)}
.approval-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
.btn-secondary{background:var(--gray-200);color:var(--gray-700)}
[data-theme="dark"] .btn-secondary{background:var(--gray-600);color:white}
.btn-success{background:#10B981;color:white}.btn-danger{background:#EF4444;color:white}
.form-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow);max-width:600px}
.form-card h2{font-size:20px;font-weight:600;margin-bottom:24px}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:8px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:2px solid var(--border-color);border-radius:var(--radius);font-size:14px;background:var(--bg-primary);color:var(--text-primary);transition:all 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.days-preview{background:var(--bg-secondary);padding:12px;border-radius:var(--radius);margin-bottom:16px;display:flex;gap:24px;font-size:14px}
.balance-warning,.conflict-warning{background:#FEE2E2;color:#EF4444;padding:12px;border-radius:var(--radius);margin-bottom:16px;font-size:14px}
.form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px}
.section-header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.section-header h2{font-size:20px;font-weight:600}
.badge-count{background:var(--primary);color:white;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:600}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px}
.filter-tab{padding:8px 16px;border:2px solid var(--border-color);background:var(--bg-card);border-radius:var(--radius);cursor:pointer;font-size:14px}
.filter-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
.audit-item{display:grid;grid-template-columns:150px 150px 1fr;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-color);font-size:13px}
.no-data{text-align:center;color:var(--text-secondary);padding:40px}
.toast{position:fixed;bottom:24px;right:24px;padding:16px 24px;border-radius:12px;color:white;font-weight:500;z-index:9999;animation:slideIn 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.toast.success{background:linear-gradient(135deg,#10B981,#059669)}.toast.error{background:linear-gradient(135deg,#EF4444,#DC2626)}.toast.info{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.sidebar{width:80px}.sidebar-header{justify-content:center}.logo-text,.nav-item span,.user-details{display:none}.nav-item{justify-content:center;padding:12px}.stats-row,.chart-section,.balance-cards{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.approval-card{flex-wrap:wrap}}}
</style>
